name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow
        pip install pyinstaller
    
    - name: Build Windows executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "AlgorithmVisualizer" --icon "icon.png" --add-data "utils.py;." --add-data "sorting_visualizer_embedded.py;." --add-data "searching_visualizer_embedded.py;." --add-data "graph_visualizer_embedded.py;." --add-data "tree_visualizer_embedded.py;." --add-data "maze_visualizer_embedded.py;." --add-data "data_structures_visualizer_embedded.py;." --add-data "algorithm_info.py;." --add-data "info_panel.py;." --add-data "README.md;." --add-data "USER_GUIDE.py;." main_menu.py
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v3
      with:
        name: AlgorithmVisualizer-Windows
        path: dist/AlgorithmVisualizer.exe
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/AlgorithmVisualizer.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

